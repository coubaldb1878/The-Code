<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pie Pizzeria</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="images/thepiefavicon/favicon-96x96.png" sizes="96x96">
</head>
<body>
    <header>
        <img class="logo" src="images/Logo.svg" alt="The Pie Pizzeria Logo.">
        <h1>THE PIE PIZZERIA</h1>
        <div onclick="toggleNav()" class="hamburger">
            <hr>
            <hr>
            <hr>
        </div>
        <nav class="toggle-nav">
            <a href="index.html">HOME</a>
            <a href="order.html">ORDER</a>
            <a href="cater.html">CATERING</a>
            <a href="contact.html">CONTACT</a>
            <a href="about.html">ABOUT</a>
        </nav>
    </header>
    <main>
       <h2>CONTACT US</h2>
       <form class="contact">
        <label for="name">NAME</label>
        <input type="text" id="name">
        <label for="email">EMAIL</label>
        <input type="email" id="email">
        <label for="message">MESSAGE</label>
        <textarea id="message" name="message" rows="5" cols="30"></textarea>
        <div class="action">
            <input type="reset" value="RESET">
            <input type="submit" value="SUBMIT">
        </div>
       </form>
    </main>
    <footer>
        <div class="socials">
            <a href="https://www.tiktok.com/en/"><img src="images/tiktok.svg" alt="tik tok icon"></a>
            <a href="https://www.facebook.com/"><img src="images/facebook.svg" alt="facebook icon"></a>
            <a href="https://www.instagram.com/"><img src="images/Instagram.svg" alt="instagram icon"></a>
        </div>
    </footer>
</body>
</html>
