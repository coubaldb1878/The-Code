<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pie Pizzeria</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">

<body>
    <header>
        <img class="logo" src="images/Logo.svg" alt="The Pie Pizzeria Logo.">
        <h1>THE PIE PIZZERIA</h1>
        <div onclick="toggleNav()" class="hamburger">
            <hr>
            <hr>

        </div>
        <nav class="toggle-nav">

            <a href="contact.html">CONTACT</a>
        </nav>
    </header>
    <main>
        <h2>MENU</h2>
        <form>
            <label for="name">Name</label>
            <input type="text">
            <label for="order">BUILD YOUR OWN PIZZA</label>
            <label for="size">PIZZA SIZE</label>
            <label for="size">10"</label>
            <input type="checkbox">
            <label for="size">12"</label>
            <input type="checkbox">

            <input type="checkbox">
            <label for="size">PIZZA SAUCE</label>
            <label for="size">MARINARA</label>
            <input type="checkbox">

            <input type="checkbox">
            <label for="size">PIZZA TOPPINGS</label>
            <label for="size">EXTRA CHEESE</label>
            <input type="checkbox">
            <label for="size">PEPPERONI</label>
            <input type="checkbox">
            <label for="size">SAUSAGE</label>
            <input type="checkbox">
            <label for="size">BACON</label>
            <input type="checkbox">
            <label for="size">HAM</label>
            <input type="checkbox">
            <label for="size">SHREDDED CHICKEN</label>
            <input type="checkbox">
            <label for="size">MUSHROOMS</label>
            <input type="checkbox">
            <label for="size">ONIONS</label>
            <input type="checkbox">
            <label for="size">BLACK OLIVES</label>
            <input type="checkbox">
            <label for="size">JALEPENOS</label>
            <input type="checkbox">

            <input type="checkbox">

            <input type="checkbox">
            <label for="size">BUFFALO SAUCE</label>
            <input type="checkbox">
            <label for="size">RANCH</label>
            <input type="checkbox">

            <label for="size">BUFFALO CHICKEN</label>
            <input type="checkbox">
            <label for="size">CHICKEN BACON RANCH</label>
            <input type="checkbox">
            <label for="size">MARGHERITA</label>
            <input type="checkbox">

            <input type="checkbox">
            <label for="size">SUPREME</label>
            <input type="checkbox">
            <label for="size">MEAT LOVERS</label>

        <form>
            <label for="name">NAME</label>
            <input type="text">
            <label for="email">EMAIL</label>
            <input type="email">
            <label for="cardinfo">CREDIT CARD NUMBER</label>
            <input type="text">
            <label for="date">EXPIRATION DATE</label>
            <input type="date">
            <label for="code">SECURITY CODE</label>
            <input type="password">
            <label for="zipcode">ZIP CODE</label>
            <input type="text">
            <label for="name">CARDHOLDER NAME</label>
            <input type="text">
            <div class="action">
                <input type="reset" value="RESET">
                <input type="submit" value="SUBMIT">
            </div>
        </form>

    </main>
    <footer>
        <div>
            <img src="images/icons8-tiktok-50.svg" alt="tik tok icon">
            <img src="images/icons8-facebook-50.svg" alt="facebook icon">
            <img src="images/icons8-instagram-50.svg" alt="instagram icon">
        </div>
