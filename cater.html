<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pie Pizzeria</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img class="logo" src="images/Logo.svg" alt="The Pie Pizzeria Logo.">
        <h1>THE PIE PIZZERIA</h1>
        <div onclick="toggleNav()" class="hamburger">
            <hr>
            <hr>
            <hr>
        </div>
        <nav class="toggle-nav">
            <a href="index.html">HOME</a>
            <a href="order.html">ORDER</a>
            <a href="cater.html">CATERING</a>
            <a href="contact.html">CONTACT</a>
            <a href="about.html">ABOUT</a>
        </nav>
    </header>
    <main>
        <h2>MENU</h2>
        <form class="menu">
            <div class="whole">
                <h3>BUILD YOUR OWN PIZZA</h3>
                <h4>PIZZA SIZE</h4>
                <div class="sizes">
                    <label for="10"><input type="checkbox" id="10">10"</label>
                    <label for="12"><input type="checkbox" id="12">12"</label>
                    <label for="16"><input type="checkbox" id="16">16"</label>
                </div>
                    <H4>PIZZA SAUCE</H4>
                    <label for="marinara"><input type="checkbox" id="marinara">MARINARA</label>
                    <label for="pesto"><input type="checkbox" id="pesto">PESTO</label>
                    <label for="alfredo"><input type="checkbox" id="alfredo">ALFREDO</label>
                    <h4>TOPPINGS</h4>
                <div class="toppings">    
                    <label for="extracheese"><input type="checkbox" id="extracheese">EXTRA CHEESE</label>
                    <label for="pepperoni"><input type="checkbox" id="pepperoni">PEPPERONI</label>
                    <label for="sausage"><input type="checkbox" id="sausage">SAUSAGE</label>
                    <label for="bacon"><input type="checkbox" id="bacon">BACON</label>
                    <label for="ham"><input type="checkbox" id="ham">HAM</label>
                    <label for="shreddedchicken"><input type="checkbox" id="shreddedchicken">SHREDDED CHICKEN</label>
                    <label for="mushrooms"><input type="checkbox" id="mushrooms">MUSHROOMS</label>
                    <label for="onions"><input type="checkbox" id="onions">ONIONS</label>
                    <label for="blackolives"><input type="checkbox" id="blackolives">BLACK OLIVES</label>
                    <label for="jalepenos"><input type="checkbox" id="jalepenos">JALEPENOS</label>
                    <label for="greenbellpeppers"><input type="checkbox" id="greenbellpeppers">GREEN BELL PEPPERS</label>
                    <label for="hothoney"><input type="checkbox" id="hothoney">HOT HONEY</label>
                    <label for="balsamicglaze"><input type="checkbox" id="balsamicglaze">BALSAMIC GLAZE</label>
                    <label for="buffalosauce"><input type="checkbox" id="buffalosauce">BUFFALO SAUCE</label>
                    <label for="ranch"><input type="checkbox" id="ranch">RANCH</label>
                    <h4>OUR CREATIONS</h4>
                    <label for="buffchicken"><input type="checkbox" id="buffchicken">BUFFALO CHICKEN PIZZA</label>
                    <label for="cbr"><input type="checkbox" id="cbr">CHICKEN BACON RANCH PIZZA</label>
                    <label for="marg"><input type="checkbox" id="marg">MARGHERITA PIZZA</label>
                    <label for="chickenalfredo"><input type="checkbox" id="chickenalfredo">CHICKEN ALFREDO PIZZA</label>
                    <label for="supreme"><input type="checkbox" id="supreme">SUPREME PIZZA</label>
                    <label for="meatlovers"><input type="checkbox" id="meatlovers">MEAT LOVERS PIZZA</label>
                </div>    
            </div>
        </form>
        <h2 class="paymentheading">PAYMENT</h2>
        <form class="payment">
            <div class="paymentwhole">
                <label for="name">NAME</label>
                <input type="text" id="name">
                <label for="email">EMAIL</label>
                <input type="email" id="email">
                <label for="address">EVENT ADDRESS</label>
                <input type="text" id="address">
                <label for="cardinfo">CREDIT CARD NUMBER</label>
                <input type="text" id="cardinfo">
                <label for="date">EXPIRATION DATE</label>
                <input type="date" id="date">
                <label for="code">SECURITY CODE</label>
                <input type="password" id="code">
                <label for="zipcode">ZIP CODE</label>
                <input type="text" id="zipcode">
                <label for="cardholder">CARDHOLDER NAME</label>
                <input type="text" id="cardholder">
                <div class="action">
                    <input type="reset" value="RESET">
                    <input type="submit" value="SUBMIT">
                </div>
            </div>
        </form>
    </main>
    <footer>
        <div class="socials">
            <a href="https://www.tiktok.com/en/"><img src="images/tiktok.svg" alt="tik tok icon"></a>
            <a href="https://www.facebook.com/"><img src="images/facebook.svg" alt="facebook icon"></a>
            <a href="https://www.instagram.com/"><img src="images/Instagram.svg" alt="instagram icon"></a>
        </div>
    </footer>
</body>
</html>
